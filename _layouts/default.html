<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border-radius: 8px;
    }

    h1, h2, h3 {
      color: #111;
    }

    a {
      color: #0366d6;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav {
      margin-bottom: 30px;
      font-size: 14px;
    }

    .nav a {
      margin-right: 15px;
      color: #555;
    }

    .post-date {
      color: #888;
      font-size: 14px;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 30px 0;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="nav">
      <a href="/">Home</a>
    </div>

    {{ content }}

  </div>
</body>
</html>
